name: Ci - Front

on:
  pull_request: 
  push:
    branches: [main]

jobs: 
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install
        run: npm ci

      - run: npm run lint
      - run: npx tsc --noEmit
      - run: npm run build
      